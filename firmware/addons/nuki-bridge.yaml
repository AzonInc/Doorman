esp32:
  framework:
    type: arduino
    version: 2.0.16
    platform_version: 6.7.0

esphome:
  libraries:
  - Preferences
  - https://github.com/h2zero/NimBLE-Arduino#1.4.0
  - Crc16
  - https://github.com/I-Connect/NukiBleEsp32

external_components:
  - source: github://AzonInc/ESPHome_nuki_lock@feature/basic-settings
    refresh: 60s

# Pairing Mode
binary_sensor:
  - id: !extend doorman_boot_button
    on_multi_click:
      - timing:
            - ON for at least 5s
        then:
          - if:
              condition:
                binary_sensor.is_on: nuki_paired
              then:
                - nuki_lock.unpair:
                    id: nuki_smart_lock
                - lambda: |
                    ESP_LOGI("pairing", "Pairing Mode: TODO");
            
          - nuki_lock.set_pairing_mode: 
              id: nuki_smart_lock
              pairing_mode: true


# Nuki Lock Bridge
lock:
  - platform: nuki_lock
    name: Nuki Lock
    id: nuki_smart_lock

    # Required:
    is_connected: 
      id: nuki_connected
      name: "Nuki Connected"
      icon: "mdi:link"
      entity_category: DIAGNOSTIC
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -10

    is_paired:
      id: nuki_paired
      name: "Nuki Paired"
      icon: "mdi:link"
      entity_category: DIAGNOSTIC
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -9

    # Optional:
    battery_critical:
      id: nuki_battery_critical
      name: "Nuki Battery Critical"
      entity_category: DIAGNOSTIC
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -8

    battery_level:
      id: nuki_battery_level
      name: "Nuki Battery Level"
      entity_category: DIAGNOSTIC
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -7

    door_sensor:
      id: nuki_door_sensor
      name: "Nuki Door Sensor"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -6

    door_sensor_state:
      id: nuki_door_sensor_state
      name: "Nuki Door Sensor State"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -5

    pairing_mode:
      id: nuki_pairing_mode
      name: "Nuki Pairing Mode"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -4

    unpair:
      id: nuki_unpair_device
      name: "Nuki Unpair Device"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    auto_unlatch:
      id: nuki_auto_unlatch
      name: "Nuki Auto unlatch"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    button_enabled:
      name: "Nuki Button enabled"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    led_enabled:
      id: nuki_led_enabled
      name: "Nuki LED enabled"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    led_brightness:
      id: nuki_brightness
      name: "Nuki LED brightness"
      disabled_by_default: true
      mode: slider
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    night_mode_enabled:
      id: nuki_night_mode
      name: "Nuki Night Mode"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    night_mode_auto_lock_enabled:
      id: nuki_night_mode_auto_lock_enabled
      name: "Nuki Night Mode: Auto Lock"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    night_mode_auto_unlock_disabled:
      id: nuki_night_mode_auto_unlock_disabled
      name: "Nuki Night Mode: Reject Auto Unlock"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    night_mode_immediate_lock_on_start_enabled:
      id: nuki_night_mode_immediate_lock_on_start
      name: "Nuki Night Mode: Lock at Start Time"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    auto_lock_enabled:
      id: nuki_auto_lock
      name: "Nuki Auto Lock"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    auto_unlock_disabled:
      id: nuki_auto_unlock_disabled
      name: "Nuki Auto Unlock: Disable"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    immediate_auto_lock_enabled:
      id: nuki_immediate_auto_lock
      name: "Nuki Auto Lock: Immediately"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    auto_update_enabled:
      id: nuki_auto_update
      name: "Nuki Automatic Updates"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    single_buton_press_action:
      id: nuki_single_button_press_action
      name: "Nuki Single Button Press Action"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    double_buton_press_action:
      id: nuki_double_button_press_action
      name: "Nuki Double Button Press Action"
      disabled_by_default: true
      web_server:
        sorting_group_id: sorting_group_nuki
        sorting_weight: -3

    on_pairing_mode_on_action:
      - script.execute: update_led

    on_pairing_mode_off_action:
      - script.execute: update_led
    
    on_paired_action:
      - light.turn_on:
          id: doorman_rgb_status_led
          red: 100%
          green: 0%
          blue: 100%
          effect: none
          brightness: 60%
      - delay: 3s
      - script.execute: update_led

    web_server:
      sorting_group_id: sorting_group_nuki
      sorting_weight: -11

script:
  - id: !extend update_led
    then:
      - if:
          condition:
            - switch.is_on: nuki_pairing_mode
          then:
            - light.turn_on:
                id: doorman_rgb_status_led
                red: 100%
                green: 0%
                blue: 100%
                effect: pulse
